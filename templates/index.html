<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanglish to English Translator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .translator-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        .box-panel {
            display: flex;
            flex-direction: column;
        }

        .box-panel h3 {
            color: #34495e;
            margin-bottom: 12px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        textarea, .output-display {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            font-size: 1.05rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #3498db;
        }

        .output-display {
            background-color: #f8f9fa;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .result-segment {
            margin-bottom: 15px;
        }

        .result-segment strong {
            display: block;
            font-size: 0.85rem;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .result-text {
            color: #2c3e50;
            font-size: 1.1rem;
        }

        .button-container {
            margin-top: 15px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Responsive Layout for Smaller Screens */
        @media (max-width: 768px) {
            .translator-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            textarea, .output-display {
                height: 180px;
            }
        }
    </style>
</head>
<body>

    <h1>Tanglish ➔ English Translator</h1>

    <div class="translator-container">
        <!-- Left Side: Input Box -->
        <div class="box-panel">
            <h3>Type Tanglish</h3>
            <textarea id="inputText" placeholder="E.g., ena panra..."></textarea>
            
            <div class="button-container">
                <button id="translateBtn" onclick="performTranslation()">Translate</button>
            </div>
        </div>

        <!-- Right Side: Output Box -->
        <div class="box-panel">
            <h3>Translate Text</h3>
            <div class="output-display" id="outputContainer">
                <div class="result-text" style="color: #7f8c8d; font-style: italic;">
                    Your translation results will appear here...
                </div>
            </div>
        </div>
    </div>

    <script>
        async function performTranslation() {
            const inputTextArea = document.getElementById("inputText");
            const outputContainer = document.getElementById("outputContainer");
            const translateBtn = document.getElementById("translateBtn");
            
            const text = inputTextArea.value.trim();
            if (!text) return;

            // UI feedback during background work
            translateBtn.disabled = true;
            translateBtn.innerText = "Translating...";
            outputContainer.innerHTML = '<div class="result-text" style="color: #7f8c8d;">Processing offline translation...</div>';

            try {
                const response = await fetch("/translate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (response.ok) {
                    outputContainer.innerHTML = `
                        <div class="result-segment">
                            <strong>English Translation</strong>
                            <div class="result-text">${data.english_translation}</div>
                        </div>
                        <div class="result-segment" style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #dcdde1;">
                            <strong>Tamil Script</strong>
                            <div class="result-text" style="color: #16a085;">${data.tamil_transliteration}</div>
                        </div>
                    `;
                } else {
                    outputContainer.innerHTML = `<div class="result-text" style="color: #e74c3c;"><strong>Error:</strong> ${data.error}</div>`;
                }
            } catch (error) {
                outputContainer.innerHTML = `<div class="result-text" style="color: #e74c3c;"><strong>Network Error:</strong> Failed to reach Flask backend.</div>`;
            } finally {
                translateBtn.disabled = false;
                translateBtn.innerText = "Translate";
            }
        }
    </script>

</body>
</html>
